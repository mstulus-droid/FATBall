<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Support</title>
<link rel="icon" type="image/webp" href="logo-ps-light.webp">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  [data-theme="dark"] {
    --bg: #080b14;
    --card: #0f1524;
    --card2: #141c30;
    --border: #1e2d4d;
    --text: #c8d6ef;
    --muted: #5a6a8a;
    --heading: #ffffff;
    --row-hover: rgba(255,255,255,0.02);
    --shadow: rgba(0,0,0,0.4);
    --grid-line: rgba(0,198,255,0.03);
    --ph: #3a4a6a;
  }
  [data-theme="light"] {
    --bg: #eef1f8;
    --card: #ffffff;
    --card2: #f4f6fc;
    --border: #dde3f0;
    --text: #3a4668;
    --muted: #8a96b8;
    --heading: #111827;
    --row-hover: rgba(0,0,0,0.02);
    --shadow: rgba(60,80,140,0.07);
    --grid-line: rgba(60,100,200,0.04);
    --ph: #b0bada;
  }
  :root {
    --accent: #e8175d;
    --cyan: #00aaee;
    --tulus: #e8175d;
    --asok: #0ea5e9;
    --irwan: #7c3aed;
    --win: #22c55e;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events:none; z-index:0;
  }
  .container { max-width:960px; margin:0 auto; padding:24px 16px; position:relative; z-index:1; }

  /* HEADER */
  .header {
    display:flex; align-items:center; gap:16px;
    margin-bottom:40px; padding-bottom:24px;
    border-bottom:1px solid var(--border);
  }
  .ps-logo {
    width:52px; height:52px;
    background:transparent;
    border-radius:12px;
    display:block; object-fit:cover;
    box-shadow:0 0 24px rgba(232,23,93,0.2); flex-shrink:0;
  }
  .header-text h1 {
    font-family:'Orbitron',monospace; font-size:22px; font-weight:900;
    letter-spacing:2px; color:var(--heading);
  }
  .header-text { flex:1; min-width:0; }
  .header-right { margin-left:auto; display:flex; align-items:center; gap:10px; }
  .badge {
    padding:4px 12px; border-radius:20px; font-size:11px; font-weight:600;
    letter-spacing:1px; text-transform:uppercase;
    background:rgba(0,170,238,0.08); border:1px solid rgba(0,170,238,0.25); color:var(--cyan);
  }
  .theme-btn {
    display:flex; align-items:center; gap:6px;
    padding:6px 12px; border-radius:20px; cursor:pointer;
    border:1px solid var(--border); background:var(--card2);
    font-size:12px; color:var(--muted); font-family:'DM Sans',sans-serif;
    transition:all 0.2s;
  }
  .theme-btn:hover { border-color:var(--cyan); color:var(--cyan); }

  /* SCOREBOARD */
  .scoreboard { display:grid; gap:12px; margin-bottom:32px; }
  .scoreboard-group { width:100%; }
  .scoreboard-group.mini-group { width:fit-content; margin:0 auto; }
  .scoreboard-group.pending-group {
    border:1px dashed rgba(0,170,238,0.28); border-radius:20px; padding:12px;
    background:linear-gradient(180deg, rgba(0,170,238,0.03), transparent);
  }
  .scoreboard-main,
  .scoreboard-mini { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  .scoreboard-mini { opacity:0.84; grid-template-columns:repeat(3, minmax(88px, 112px)); }
  .player-card {
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    padding:18px 16px 16px; position:relative; overflow:hidden;
    transition:transform 0.2s, box-shadow 0.2s, background 0.3s;
    box-shadow:0 2px 12px var(--shadow); text-align:center;
    display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
  }
  .player-card.winner-state {
    background:
      radial-gradient(circle at top, rgba(255,221,87,0.22), transparent 36%),
      linear-gradient(180deg, rgba(255,252,233,0.95), rgba(255,243,196,0.72)),
      var(--card);
    border-color:rgba(255,196,0,0.45);
    box-shadow:0 12px 30px rgba(255,196,0,0.18);
  }
  .player-card:hover { transform:translateY(-2px); }
  .player-card.clickable { cursor:pointer; }
  .player-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
  .player-card.tulus::before { background:linear-gradient(90deg,var(--tulus),transparent); }
  .player-card.asok::before  { background:linear-gradient(90deg,var(--asok),transparent); }
  .player-card.irwan::before { background:linear-gradient(90deg,var(--irwan),transparent); }
  .player-card.tulus:hover { box-shadow:0 8px 32px rgba(232,23,93,0.12); }
  .player-card.asok:hover  { box-shadow:0 8px 32px rgba(14,165,233,0.12); }
  .player-card.irwan:hover { box-shadow:0 8px 32px rgba(124,58,237,0.12); }
  .player-name {
    font-family:'Orbitron',monospace; font-size:14px; font-weight:900; letter-spacing:1px;
    margin-bottom:10px;
  }
  .tulus .player-name { color:var(--tulus); }
  .asok .player-name { color:var(--asok); }
  .irwan .player-name { color:var(--irwan); }
  .player-status-icon {
    min-height:42px; display:flex; align-items:center; justify-content:center; margin-bottom:6px;
  }
  .player-card.pending .player-name { margin-bottom:6px; }
  .player-card.pending .player-status-icon { min-height:10px; margin-bottom:2px; }
  .player-team-name {
    font-family:'Orbitron',monospace; font-size:22px; font-weight:700; color:var(--heading);
    line-height:1.2; margin-bottom:0; word-break:break-word;
  }
  .player-team-aborted {
    margin-top:8px; font-size:11px; font-weight:800; line-height:1.25;
    color:var(--muted);
  }
  .player-team-aborted-name {
    text-decoration-line:line-through;
    text-decoration-thickness:2px;
    text-decoration-color:#111827;
    color:#111827;
    opacity:0.8;
  }
  .player-team-aborted-note {
    display:block; margin-top:2px; color:#ef4444;
  }
  .player-loser {
    font-size:24px; line-height:1; filter:drop-shadow(0 4px 8px rgba(0,0,0,0.1));
  }
  .winner-badge {
    position:relative; width:56px; height:42px; margin:0 auto 0;
  }
  .winner-badge::before {
    content:'🤴🏻'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:30px; filter:drop-shadow(0 0 10px rgba(255,196,0,0.45));
    animation:crown-pop 1.2s ease-in-out infinite alternate;
  }
  .winner-badge::after {
    content:'✦'; position:absolute; right:-2px; top:-4px; font-size:12px; color:#fbbf24;
    text-shadow:0 0 10px rgba(251,191,36,0.55); animation:sparkle 1s ease-in-out infinite;
  }
  .next-hint { margin-top:4px; font-size:11px; color:var(--muted); text-align:center; }
  .player-card.mini {
    padding:6px 5px; border-radius:10px; box-shadow:0 1px 5px var(--shadow);
  }
  .player-card.mini .player-name { font-size:10px; margin-bottom:6px; }
  .player-card.mini .player-status-icon { min-height:24px; margin-bottom:4px; }
  .player-card.mini .player-team-name { font-size:10px; margin-bottom:2px; }
  .player-card.mini .player-loser { font-size:12px; }
  .player-card.mini .winner-badge { width:24px; height:20px; }
  .player-card.mini .winner-badge::before { font-size:14px; }
  .mini-title {
    font-size:9px; letter-spacing:1.6px; text-transform:uppercase; color:var(--muted);
    text-align:center; margin-bottom:6px;
  }
  .previous-btn {
    display:flex; align-items:center; justify-content:center; gap:8px;
    min-width:180px; padding:10px 14px; border-radius:999px;
    border:1px solid var(--border); background:var(--card2); color:var(--heading);
    font-size:12px; font-weight:700; letter-spacing:1px; cursor:pointer;
    box-shadow:0 8px 18px rgba(0,0,0,0.06); transition:all 0.2s;
  }
  .previous-btn:hover { border-color:var(--cyan); color:var(--cyan); transform:translateY(-1px); }
  .main-title {
    font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--muted);
    text-align:center; margin-bottom:2px;
  }
  .main-title.next {
    color:var(--cyan); text-shadow:0 0 12px rgba(0,170,238,0.18);
  }
  .next-hint { margin-top:0; margin-bottom:8px; font-size:11px; color:var(--muted); text-align:center; }
  @keyframes crown-pop {
    from { transform:translateY(0) scale(1) rotate(-4deg); }
    to { transform:translateY(-1px) scale(1.08) rotate(4deg); }
  }
  @keyframes sparkle {
    0%,100% { opacity:0.45; transform:scale(0.8); }
    50% { opacity:1; transform:scale(1.2); }
  }
  @keyframes spin {
    to { transform:rotate(360deg); }
  }
  /* SECTION */
  .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .section-title {
    font-family:'Orbitron',monospace; font-size:13px; letter-spacing:2px;
    text-transform:uppercase; color:var(--heading);
    display:flex; align-items:center; gap:8px;
  }
  .section-title::before {
    content:''; width:3px; height:16px;
    background:var(--accent); border-radius:2px;
    box-shadow:0 0 8px rgba(232,23,93,0.4);
  }
  .icon-toggle {
    width:30px; height:30px; border-radius:999px; border:1px solid var(--border);
    background:var(--card2); color:var(--muted); font-family:'Orbitron',monospace;
    cursor:pointer; transition:all 0.2s;
  }
  .icon-toggle:hover { color:var(--cyan); border-color:var(--cyan); }
  .section-header.centered { justify-content:center; }
  .section-toggle-stack {
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
    cursor:pointer; user-select:none; margin:0 auto;
  }
  .section-title.plain::before { content:none; }
  .section-title.plain {
    justify-content:center; text-align:center;
  }
  .section-caret {
    font-size:11px; color:var(--muted); line-height:1; transition:transform 0.2s ease;
  }
  .section-caret.expanded { transform:rotate(180deg); }
  .section-caret-side {
    font-size:12px; color:var(--muted); line-height:1;
  }
  .next-header-compact {
    margin-bottom:6px;
  }
  .history-header-tight {
    margin-top:12px;
    margin-bottom:6px;
  }
  .scoreboard-heading {
    font-family:'Orbitron',monospace; font-size:13px; letter-spacing:2px;
    text-transform:uppercase; color:var(--heading); text-align:center; margin-bottom:10px;
  }

  /* ADD PANEL */
  .add-panel {
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    padding:20px; margin-bottom:32px;
    box-shadow:0 2px 12px var(--shadow); transition:background 0.3s;
  }
  .is-hidden { display:none !important; }

  .form-grid { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:10px; margin-top:16px; }
  .form-group { display:flex; flex-direction:column; gap:6px; }
  .form-group label { font-size:10px; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); }
  .input-wrap { position:relative; }
  .form-group input {
    background:var(--card2); border:1px solid var(--border); border-radius:8px;
    color:var(--heading); font-family:'DM Sans',sans-serif; font-size:13px;
    padding:9px 12px; outline:none; transition:border-color 0.2s, background 0.3s; width:100%;
  }
  .form-group input::placeholder { color:var(--ph); }
  .form-group input:focus { border-color:var(--cyan); }

  /* copy all teams */
  .copy-all-wrap { display:flex; justify-content:center; margin-bottom:14px; }
  .copy-all-btn {
    display:flex; align-items:center; gap:5px;
    margin:0 auto; padding:11px 16px; font-size:12px; font-weight:700;
    border-radius:12px; border:1px solid rgba(0,170,238,0.22);
    background:linear-gradient(135deg, rgba(0,170,238,0.14), rgba(232,23,93,0.08)); color:var(--heading);
    cursor:pointer; letter-spacing:0.5px; transition:all 0.2s;
    font-family:'DM Sans',sans-serif;
    box-shadow:0 10px 24px rgba(0,170,238,0.08);
    justify-content:center; width:max-content;
  }
  .copy-all-btn:hover { border-color:var(--cyan); color:var(--cyan); transform:translateY(-1px); }

  .btn-add {
    margin-top:14px; width:100%; padding:11px;
    background:linear-gradient(135deg,var(--accent),#c0124a); border:none; border-radius:10px;
    color:white; font-family:'Orbitron',monospace; font-size:12px; font-weight:700;
    letter-spacing:2px; cursor:pointer; transition:opacity 0.2s, transform 0.1s;
    box-shadow:0 4px 16px rgba(232,23,93,0.25);
  }
  .btn-add:hover { opacity:0.9; transform:translateY(-1px); }
  .btn-add:active { transform:translateY(0); }

  /* HISTORY TABLE */
  .history-wrap {
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    overflow:hidden; box-shadow:0 2px 12px var(--shadow);
  }
  .trash-wrap {
    margin-top:14px;
  }
  .trash-head {
    display:flex; align-items:center; justify-content:center;
    padding:0 0 10px;
  }
  .trash-toggle {
    width:40px; height:40px; border:none; border-radius:999px; cursor:pointer;
    display:inline-flex; align-items:center; justify-content:center;
    background:var(--card2); color:var(--heading); font-size:18px;
    box-shadow:0 10px 18px rgba(15,23,42,0.08);
    position:relative;
  }
  .trash-count {
    position:absolute; top:-4px; right:-4px;
    min-width:18px; height:18px; padding:0 5px; border-radius:999px;
    display:inline-flex; align-items:center; justify-content:center;
    background:var(--accent); color:#fff; font-size:10px; font-weight:800;
    box-shadow:0 6px 12px rgba(232,23,93,0.22);
  }
  .trash-list {
    display:grid; gap:0;
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    overflow:hidden; box-shadow:0 2px 12px var(--shadow);
  }
  .trash-item {
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:12px 14px; border-bottom:1px solid var(--border);
  }
  .trash-item:last-child { border-bottom:none; }
  .trash-copy {
    min-width:0; display:flex; flex-direction:column; gap:4px;
  }
  .trash-title {
    font-weight:700; color:var(--heading);
  }
  .trash-meta {
    font-size:12px; color:var(--muted);
  }
  .trash-actions {
    display:flex; align-items:center; gap:8px; flex-shrink:0;
  }
  .trash-icon-btn {
    width:34px; height:34px; border:none; border-radius:999px; cursor:pointer;
    display:inline-flex; align-items:center; justify-content:center;
    font-size:15px; color:var(--heading); background:var(--card2);
    box-shadow:0 8px 16px rgba(15,23,42,0.08);
  }
  .trash-icon-btn.restore { color:#0284c7; }
  .trash-icon-btn.delete { color:#dc2626; }
  .history-table { width:100%; border-collapse:collapse; }
  .history-table thead tr { background:var(--card2); border-bottom:1px solid var(--border); }
  .history-table th {
    padding:12px 14px; font-size:10px; text-transform:uppercase;
    letter-spacing:2px; color:var(--muted); text-align:center; font-weight:600;
  }
  .history-table th.t-col { color:var(--tulus); }
  .history-table th.a-col { color:var(--asok); }
  .history-table th.i-col { color:var(--irwan); }
  .history-table tbody tr { border-bottom:1px solid var(--border); transition:background 0.15s; }
  .history-table tbody tr:last-child { border-bottom:none; }
  .history-table tbody tr:hover { background:var(--row-hover); }
  .history-table td { padding:11px 14px; font-size:13px; text-align:center; vertical-align:middle; }
  .history-table td.date-col { color:var(--muted); font-size:11px; white-space:nowrap; text-align:center; }
  .team-cell { display:flex; align-items:center; justify-content:center; gap:7px; }
  .team-name { font-weight:400; color:var(--text); }
  .team-name.winner { font-weight:700; }
  .team-name.aborted {
    text-decoration-line:line-through;
    text-decoration-thickness:2px;
    text-decoration-color:#111827;
    color:#111827;
  }
  .team-abort-mark {
    font-size:13px; line-height:1;
    filter:drop-shadow(0 2px 4px rgba(17,24,39,0.15));
  }
  .row-num { color:var(--muted); font-size:11px; font-family:'Orbitron',monospace; text-align:center; }
  .empty-row td { text-align:center; padding:40px; color:var(--muted); font-size:13px; }
  .btn-del {
    background:none; border:none; color:var(--muted); cursor:pointer;
    font-size:13px; padding:2px 6px; border-radius:4px; transition:color 0.2s, background 0.2s;
  }
  .btn-del:hover { color:var(--accent); background:rgba(232,23,93,0.08); }
  .btn-edit {
    background:none; border:none; color:var(--muted); cursor:pointer;
    font-size:13px; padding:2px 6px; border-radius:4px; transition:color 0.2s, background 0.2s;
  }
  .btn-edit:hover { color:var(--cyan); background:rgba(0,170,238,0.08); }
  .action-buttons { display:flex; align-items:center; justify-content:center; gap:2px; }

  .modal-backdrop {
    position:fixed; inset:0; background:rgba(5,10,20,0.42); backdrop-filter:blur(8px);
    display:flex; align-items:center; justify-content:center; padding:16px; z-index:1001;
  }
  .modal-card {
    width:min(420px, 100%); background:var(--card); border:1px solid var(--border);
    border-radius:20px; box-shadow:0 20px 60px rgba(0,0,0,0.18); padding:20px;
  }
  .modal-title {
    font-family:'Orbitron',monospace; font-size:16px; font-weight:800; letter-spacing:1px;
    color:var(--heading); margin-bottom:8px; text-align:center;
  }
  .modal-subtitle { font-size:13px; color:var(--muted); margin-bottom:16px; text-align:center; }
  .modal-group { margin-bottom:14px; }
  .modal-label {
    display:block; font-size:10px; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-bottom:8px;
  }
  .modal-date {
    width:100%; background:var(--card2); border:1px solid var(--border); border-radius:10px;
    color:var(--heading); padding:10px 12px; font-family:'DM Sans',sans-serif; font-size:13px;
  }
  .winner-choices { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
  .winner-choice {
    border:1px solid var(--border); background:var(--card2); color:var(--muted);
    border-radius:12px; padding:10px 8px; font-family:'Orbitron',monospace; font-size:13px; cursor:pointer;
    transition:all 0.2s;
  }
  .winner-choice.active { color:var(--heading); border-color:var(--cyan); box-shadow:0 0 0 1px rgba(0,170,238,0.16) inset; }
  .winner-choice.t.active { color:var(--tulus); border-color:var(--tulus); background:rgba(232,23,93,0.08); }
  .winner-choice.a.active { color:var(--asok); border-color:var(--asok); background:rgba(14,165,233,0.08); }
  .winner-choice.i.active { color:var(--irwan); border-color:var(--irwan); background:rgba(124,58,237,0.08); }
  .winner-choice.none.active { color:var(--muted); }
  .modal-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:18px; }
  .modal-btn {
    border-radius:10px; padding:10px 14px; font-size:12px; font-weight:700; letter-spacing:1px;
    border:1px solid var(--border); background:var(--card2); color:var(--muted); cursor:pointer;
  }
  .modal-btn.primary {
    background:linear-gradient(135deg,var(--accent),#c0124a); color:#fff; border-color:transparent;
    box-shadow:0 8px 20px rgba(232,23,93,0.18);
  }
  .result-cards {
    display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:8px;
  }
  .trophy-list {
    display:grid; gap:10px; margin-top:8px;
    max-height:min(48vh, 360px); overflow:auto; padding-right:4px;
  }
  .trophy-item {
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:12px 14px; border-radius:14px; background:var(--card2); border:1px solid var(--border);
  }
  .trophy-item.abort {
    background:linear-gradient(180deg, rgba(239,68,68,0.08), rgba(244,63,94,0.05));
    border-color:rgba(239,68,68,0.18);
  }
  .trophy-copy {
    display:flex; flex-direction:column; gap:6px; min-width:0; flex:1;
  }
  .trophy-team {
    font-weight:700; color:var(--heading);
  }
  .trophy-team.abort {
    text-decoration-line:line-through;
    text-decoration-thickness:2px;
    text-decoration-color:#111827;
    color:#111827;
  }
  .trophy-note {
    font-size:12px; font-weight:700; color:var(--muted);
    line-height:1.25;
  }
  .trophy-meta {

function getLocalTrashIds(){
  try {
    const raw = localStorage.getItem(LOCAL_TRASH_KEY);
    const parsed = raw ? JSON.parse(raw) : [];
    return Array.isArray(parsed) ? parsed.map(Number).filter(Boolean) : [];
  } catch {
    return [];
  }
}

function setLocalTrashIds(ids){
  localStorage.setItem(LOCAL_TRASH_KEY, JSON.stringify(Array.from(new Set(ids.map(Number).filter(Boolean)))));
}

function applyLocalTrash(source){
  const trashIds = new Set(getLocalTrashIds());
  return source.filter(match => !trashIds.has(Number(match.id)));
}

function getTrashMatches(){
  const trashIds = new Set(getLocalTrashIds());
  return allMatches.filter(match => trashIds.has(Number(match.id))).sort((a,b) => (b.id || 0) - (a.id || 0));
}

function formatDateLabel(date){
  return date.toLocaleDateString('id-ID', {
    weekday:'long',
    day:'numeric',
    month:'short'
  });
}

function normalizeDateValue(value){
  if(!value) return '';
  if(typeof value === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(value)) return value;

  const date = new Date(value);
  if(Number.isNaN(date.getTime())) return String(value);

  const local = new Date(date.getTime() - (date.getTimezoneOffset() * 60000));
  return local.toISOString().slice(0, 10);
}

function setLoading(active, message = 'Sedang sinkron...'){
  const overlay = document.getElementById('loading-overlay');
  const text = document.getElementById('loading-text');
  if(!overlay || !text) return;

  if(active){
    loadingCount += 1;
    text.textContent = message;
    overlay.classList.add('show');
    overlay.setAttribute('aria-hidden', 'false');
    return;
  }

  loadingCount = Math.max(0, loadingCount - 1);
  if(loadingCount === 0){
    overlay.classList.remove('show');
    overlay.setAttribute('aria-hidden', 'true');
  }
}

function initFooterStars(){
  const canvas = document.getElementById('rhadzor-footer-canvas');
  const footer = document.querySelector('.rhadzor-footer');
  if(!canvas || !footer) return;

  const ctx = canvas.getContext('2d');
  if(!ctx) return;

  if(footerStarsState){
    if(footerStarsState.resizeHandler){
      window.removeEventListener('resize', footerStarsState.resizeHandler);
    }
    if(footerStarsState.rafId){
      cancelAnimationFrame(footerStarsState.rafId);
    }
  }

  const state = {
    canvas,
    ctx,
    stars: [],
    width: 0,
    height: 0,
    dpr: Math.min(window.devicePixelRatio || 1, 2),
    rafId: 0,
    lastTs: 0,
    resizeHandler: null,
  };

  const rand = (min, max) => min + Math.random() * (max - min);
  const pick = arr => arr[Math.floor(Math.random() * arr.length)];
  const palette = [
    'rgba(255,255,255,0.95)',
    'rgba(226,232,240,0.82)',
    'rgba(186,230,253,0.9)',
    'rgba(125,211,252,0.88)',
  ];

  const createStar = (layer, initial = false) => {
    const baseY = {
      far: [8, state.height * 0.78],
      mid: [8, state.height * 0.66],
      near:[10, state.height * 0.54],
    }[layer];
    const radius = {
      far: rand(0.5, 1.1),
      mid: rand(0.9, 1.9),
      near: rand(1.4, 2.8),
    }[layer];
    const travel = {
      far: rand(10, 22),
      mid: rand(24, 46),
      near: rand(52, 96),
    }[layer] * (0.85 + (radius * 0.12));
    const direction = layer === 'far'
      ? { vx: -travel, vy: -(travel * rand(0.08, 0.2)) }
      : layer === 'mid'
        ? { vx: travel * rand(0.42, 0.62), vy: travel * rand(0.14, 0.26) }
        : { vx: travel * rand(0.78, 1.02), vy: travel * rand(0.28, 0.46) };
    const spawn = (() => {
      if(initial) return { x: rand(0, state.width), y: rand(baseY[0], Math.max(baseY[0] + 10, baseY[1])) };
      if(layer === 'far'){
        return {
          x: state.width + rand(10, 120),
          y: state.height + rand(4, 36),
        };
      }
      return {
        x: -rand(14, 90),
        y: -rand(6, 36),
      };
    })();
    return {
      layer,
      x: spawn.x,
      y: spawn.y,
      r: radius,
      vx: direction.vx,
      vy: direction.vy,
      alpha: {
        far: rand(0.26, 0.46),
        mid: rand(0.46, 0.78),
        near: rand(0.58, 0.82),
      }[layer],
      color: pick(palette),
      twinkle: rand(0.6, 1.4),
      twinkleOffset: rand(0, Math.PI * 2),
    };
  };

  const buildStars = () => {
    state.stars = [
      ...Array.from({ length: 24 }, () => createStar('far', true)),
      ...Array.from({ length: 11 }, () => createStar('mid', true)),
      ...Array.from({ length: 3 }, () => createStar('near', true)),
    ];
  };

  const resize = () => {
    const rect = footer.getBoundingClientRect();
    state.width = Math.max(1, rect.width);
    state.height = Math.max(1, rect.height);
    state.dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.round(state.width * state.dpr);
    canvas.height = Math.round(state.height * state.dpr);
    canvas.style.width = `${state.width}px`;
    canvas.style.height = `${state.height}px`;
    ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
    buildStars();
  };

  const drawStar = (star, tsSec) => {
    const twinkle = 0.84 + (Math.sin((tsSec * star.twinkle) + star.twinkleOffset) * 0.16);
    const alpha = Math.max(0.08, Math.min(1, star.alpha * twinkle));

    ctx.beginPath();
    ctx.fillStyle = star.color.replace(/[\d.]+\)$/u, `${alpha})`);
    ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
    ctx.fill();
  };

  const animate = (ts) => {
    if(!state.lastTs) state.lastTs = ts;
    const delta = Math.min(0.05, (ts - state.lastTs) / 1000);
    state.lastTs = ts;
    const tsSec = ts / 1000;

    ctx.clearRect(0, 0, state.width, state.height);

    for(let i = 0; i < state.stars.length; i += 1){
      const star = state.stars[i];
      star.x += star.vx * delta;
      star.y += star.vy * delta;

      const isFar = star.layer === 'far';
      const outOfBounds = isFar
        ? (star.x < -(star.r * 10) || star.y < -(star.r * 10))
        : (star.x > state.width + (star.r * 10) || star.y > state.height + (star.r * 10));

      if(outOfBounds){
        state.stars[i] = createStar(star.layer, false);
        continue;
      }

      drawStar(star, tsSec);
    }

    state.rafId = requestAnimationFrame(animate);
  };

  state.resizeHandler = () => resize();
  resize();
  window.addEventListener('resize', state.resizeHandler);
  state.rafId = requestAnimationFrame(animate);
  footerStarsState = state;
}

function formatDateDisplay(value){
  if(!value) return '—';
  const normalized = normalizeDateValue(value);
  if(/^\d{4}-\d{2}-\d{2}$/.test(normalized)){
    const [y,m,d] = normalized.split('-').map(Number);
    const dt = new Date(y, m - 1, d);
    return formatDateLabel(dt);
  }
  return value;
}

function formatTrophyDateDisplay(value){
  if(!value) return 'tanggal belum ada';
  const normalized = normalizeDateValue(value);
  if(/^\d{4}-\d{2}-\d{2}$/.test(normalized)){
    const [y,m,d] = normalized.split('-').map(Number);
    const dt = new Date(y, m - 1, d);
    return dt.toLocaleDateString('id-ID', {
      weekday:'long',
      day:'numeric',
      month:'short',
      year:'numeric'
    }).toLowerCase().replace(/\./g, '');
  }
  return String(value).toLowerCase();
}

function toDateInputValue(value){
  const normalized = normalizeDateValue(value);
  if(/^\d{4}-\d{2}-\d{2}$/.test(normalized || '')) return normalized;
  return '';
}

/* --- DATA --- */
function normalizeMatch(raw){
  return {
    id: raw.id ? Number(raw.id) : null,
    T: raw.team_t ?? raw.T ?? '',
    A: raw.team_a ?? raw.A ?? '',
    I: raw.team_i ?? raw.I ?? '',
    date: normalizeDateValue(raw.match_date ?? raw.date ?? ''),
    winner: raw.winner ?? '',
    created_at: raw.created_at ?? '',
  };
}

async function fetchMatches(){
  const res = await fetch(SHEET_API_URL, { method:'GET' });
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  const payload = await res.json();
  if(!payload.success) throw new Error(payload.error || 'Gagal memuat data');
  return (payload.data || [])
    .map(normalizeMatch)
    .sort((a,b) => (a.id || 0) - (b.id || 0));
}

async function postSheetAction(body){
  const res = await fetch(SHEET_API_URL, {
    method:'POST',
    headers:{ 'Content-Type':'text/plain;charset=utf-8' },
    body: JSON.stringify(body),
  });
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  const payload = await res.json();
  if(!payload.success) throw new Error(payload.error || 'Gagal menyimpan data');
  return payload;
}

async function refreshMatches(){
  setLoading(true, 'Memuat data terbaru...');
  try {
    allMatches = await fetchMatches();
    matches = applyLocalTrash(allMatches);
    render();
  } finally {
    setLoading(false);
  }
}

async function seedDefaultDataIfEmpty(){
  const remoteMatches = await fetchMatches();
  if(remoteMatches.length) return remoteMatches;

  for (const match of DEFAULT_DATA) {
    await postSheetAction({
      action:'add',
      team_t:match.T,
      team_a:match.A,
      team_i:match.I,
      match_date:match.date,
      winner:match.winner,
    });
  }

  return fetchMatches();
}

async function initData(){
  const badge = document.getElementById('match-count-badge');
  const originalText = badge.textContent;
  badge.textContent = 'Syncing...';
  setLoading(true, 'Sinkron ke Google Sheet...');
  try {
    allMatches = await seedDefaultDataIfEmpty();
    matches = applyLocalTrash(allMatches);
    render();
  } catch (error) {
    console.error(error);
    allMatches = [...DEFAULT_DATA];
    matches = applyLocalTrash(allMatches);
    render();
    showToast('⚠️ Gagal sinkron ke Google Sheet, tampilkan data lokal default.','#ffc107');
    badge.textContent = originalText;
  } finally {
    setLoading(false);
  }
}

function getLastMatch(){
  return matches.length ? matches[matches.length - 1] : null;
}

function hasPendingMatch(){
  const last = getLastMatch();
  return !!(last && !last.winner);
}

async function confirmWinnerFromCard(playerKey){
  if(!hasPendingMatch()) return;
  const last = getLastMatch();
  if(!last || !last[playerKey] || !last.id) return;
  const teamName = last[playerKey];
  if(!confirm(`${teamName} juara di pertandingan ini?`)) return;
  try {
    setLoading(true, 'Menyimpan juara...');
    await postSheetAction({
      action:'update',
      id:last.id,
      team_t:last.T,
      team_a:last.A,
      team_i:last.I,
      match_date:last.date,
      winner:playerKey,
      created_at:last.created_at || '',
    });
    await refreshMatches();
    showToast(`✅ ${teamName} dicatat sebagai pemenang!`);
  } catch (error) {
    console.error(error);
    showToast('⚠️ Gagal update pemenang ke Google Sheet.','#ffc107');
  } finally {
    setLoading(false);
  }
}

function syncFormMode(){
  const pending = hasPendingMatch();
  const last = getLastMatch();
  const submitBtn = document.getElementById('submit-btn');
  const teamFields = document.getElementById('team-fields');
  const copyAllBtn = document.getElementById('copy-all-btn');
  const nextMatchSection = document.getElementById('next-match-section');
  const formPanel = document.getElementById('form-panel');

  if(pending && last){
    ['T','A','I'].forEach(p => document.getElementById('team-' + p).value = last[p] || '');
    document.getElementById('match-date').value = toDateInputValue(last.date);
    nextMatchSection.classList.add('is-hidden');
    teamFields.classList.add('is-hidden');
    copyAllBtn.classList.add('is-hidden');
    submitBtn.classList.add('is-hidden');
    return;
  }

  formExpanded = true;
  nextMatchSection.classList.remove('is-hidden');
  if(formPanel) formPanel.classList.toggle('is-hidden', !formExpanded);
  teamFields.classList.toggle('is-hidden', !formExpanded);
  copyAllBtn.classList.toggle('is-hidden', !formExpanded);
  submitBtn.classList.toggle('is-hidden', !formExpanded);
  submitBtn.textContent = '+ DAFTARKAN';
}

/* --- ADD / UPDATE MATCH --- */
async function submitMatch(){
  const tT   = document.getElementById('team-T').value.trim();
  const tA   = document.getElementById('team-A').value.trim();
  const tI   = document.getElementById('team-I').value.trim();
  const date = document.getElementById('match-date').value.trim();
  if(!tT||!tA||!tI){ showToast('⚠️ Isi semua nama tim dulu!','#ffc107'); return; }
  try {
    setLoading(true, 'Mendaftarkan pertandingan...');
    await postSheetAction({
      action:'add',
      team_t:tT,
      team_a:tA,
      team_i:tI,
      match_date:date,
      winner:'',
    });
    await refreshMatches();
    ['T','A','I'].forEach(p => document.getElementById('team-'+p).value='');
    document.getElementById('match-date').value='';
    showToast('✅ Pertandingan berhasil dicatat!');
  } catch (error) {
    console.error(error);
    showToast('⚠️ Gagal menambah pertandingan ke Google Sheet.','#ffc107');
  } finally {
    setLoading(false);
  }
}

/* --- DELETE --- */
async function deleteMatch(idx){
  if(!confirm('Pindahkan pertandingan ini ke Trash lokal?')) return;
  const match = matches[idx];
  if(!match || !match.id) return;
  const nextIds = [...getLocalTrashIds(), Number(match.id)];
  setLocalTrashIds(nextIds);
  matches = applyLocalTrash(allMatches);
  render();
  showToast('🗑️ Dipindah ke Trash lokal.','#e8175d');
}

function restoreTrashMatch(id){
  const nextIds = getLocalTrashIds().filter(item => Number(item) !== Number(id));
  setLocalTrashIds(nextIds);
  matches = applyLocalTrash(allMatches);
  render();
  showToast('♻️ Pertandingan dipulihkan dari Trash lokal.','#00aaee');
}

async function permanentlyDeleteTrashMatch(id){
  const match = allMatches.find(item => Number(item.id) === Number(id));
  if(!match || !match.id) return;
  if(!confirm('Hapus permanen pertandingan ini?')) return;
  try {
    setLoading(true, 'Menghapus permanen...');
    await postSheetAction({ action:'delete', id:match.id });
    const nextIds = getLocalTrashIds().filter(item => Number(item) !== Number(id));
    setLocalTrashIds(nextIds);
    await refreshMatches();
    showToast('✖️ Data dihapus permanen.','#dc2626');
  } catch (error) {
    console.error(error);
    showToast('⚠️ Gagal menghapus permanen dari Google Sheet.','#ffc107');
  } finally {
    setLoading(false);
  }
}

  const match = matches[idx];
  if(!match) return;
  editingMatchIndex = idx;
  editingWinner = match.winner || '';
  document.getElementById('edit-team-T').value = match.T || '';
  document.getElementById('edit-team-A').value = match.A || '';
  document.getElementById('edit-team-I').value = match.I || '';
  document.getElementById('edit-match-date').value = toDateInputValue(match.date);
  document.getElementById('edit-modal-subtitle').textContent = `${match.T} vs ${match.A} vs ${match.I}`;
  document.getElementById('edit-modal').classList.remove('is-hidden');
  renderEditWinnerChoices();
}

    btn.classList.toggle('active', key === editingWinner);

function openResultModal(idx){
  const match = matches[idx];
  if(!match) return;
  previousResultIndex = idx;
  const winnerClub = match.winner ? match[match.winner] : '-';
  document.getElementById('result-modal-subtitle').textContent = `${winnerClub} menjadi juara dalam kompetisi ini`;
  document.getElementById('result-modal-cards').innerHTML = ['T','A','I'].map(p => {
    const cls = p==='T'?'tulus':p==='A'?'asok':'irwan';
    const isWinner = match.winner === p;
    return `<div class="player-card ${cls} ${isWinner ? 'winner-state' : ''}">
      <div class="player-name">${PLAYERS[p].name}</div>
      <div class="player-status-icon">
        ${isWinner ? renderWinnerBadge() : '<div class="player-loser">👨🏽‍🌾</div>'}
      </div>
      <div class="player-team-name">${match[p]}</div>
    </div>`;
  }).join('');
  document.getElementById('result-modal').classList.remove('is-hidden');
}

function closeResultModal(){
  previousResultIndex = null;
  document.getElementById('result-modal').classList.add('is-hidden');
}

function handleResultBackdrop(event){
  if(event.target.id === 'result-modal') closeResultModal();
}

function formatEnglishOrdinal(value){
  const abs = Math.abs(Number(value)) || 0;
  const mod100 = abs % 100;
  if(mod100 >= 11 && mod100 <= 13) return `${abs}th`;
  const mod10 = abs % 10;
  if(mod10 === 1) return `${abs}st`;
  if(mod10 === 2) return `${abs}nd`;
  if(mod10 === 3) return `${abs}rd`;
  return `${abs}th`;
}

function getAbortVisualMeta(attempt){
  if(attempt <= 1) return { emoji:'🫡', tone:'beban negara, suntik mati' };
  if(attempt <= 3) return { emoji:'🙃', tone:'anak tidak diinginkan, bastard' };
  if(attempt <= 5) return { emoji:'🤡', tone:'dikasih panggung, malah jadi beban' };
  if(attempt <= 7) return { emoji:'💔', tone:'slot sabar, hasil nihil, lalu tamat' };
  return { emoji:'☠️', tone:'akhirnya dibuang juga, terima nasib' };
}

function renderTryBlocks(attempt, outcome = 'win'){
  const count = Math.max(1, Number(attempt) || 1);
  const finishClass = outcome === 'abort' ? 'trophy-try-finish abort' : 'trophy-try-finish';
  const finishIcon = outcome === 'abort' ? '🗑️' : '🏆';
  return `${Array.from({ length: count }, () => '<span class="trophy-try-block">👟</span>').join('')}<span class="${finishClass}">${finishIcon}</span>`;
}

function getTryVisualMeta(attempt){
  if(attempt <= 1) return { emoji:'😎', tone:'langsung jadi' };
  if(attempt === 2) return { emoji:'🙂', tone:'masih mending' };
  if(attempt === 3) return { emoji:'😒', tone:'mulai nyusahin' };
  if(attempt === 4) return { emoji:'😤', tone:'bikin emosi' };
  if(attempt === 5) return { emoji:'😬', tone:'nyaris dicoret' };
  if(attempt === 6) return { emoji:'🗿', tone:'keras kepala' };
  if(attempt === 7) return { emoji:'🤬', tone:'bangke, jadi juga' };
  return { emoji:'💀', tone:'hampir saja aborsi, tapi kesabaran membawa hasil' };
}

function buildAbortSummary(playerKey){
  const attemptsByTeam = {};
  const items = [];

  matches.forEach((match, index) => {
    const teamName = match[playerKey];
    if(!teamName) return;

    attemptsByTeam[teamName] = (attemptsByTeam[teamName] || 0) + 1;
    const nextMatch = matches[index + 1];
    const wasReplaced = !!nextMatch && nextMatch[playerKey] && nextMatch[playerKey] !== teamName;
    const isWinner = match.winner === playerKey;

    if(isWinner){
      attemptsByTeam[teamName] = 0;
      return;
    }

    if(wasReplaced){
      items.push({
        team: teamName,
        attempt: attemptsByTeam[teamName],
        type: 'abort',
        eventIndex: index
      });
      attemptsByTeam[teamName] = 0;
    }
  });

  return items.reverse();
}

function getAbortedTeamAfterMatch(matchIndex, playerKey){
  const match = matches[matchIndex];
  const nextMatch = matches[matchIndex + 1];
  if(!match || !nextMatch) return '';

  const currentTeam = match[playerKey];
  const nextTeam = nextMatch[playerKey];
  const wasReplaced = !!currentTeam && !!nextTeam && currentTeam !== nextTeam && match.winner !== playerKey;
  return wasReplaced ? currentTeam : '';
}

function buildTrophySummary(playerKey){
  const attemptsByTeam = {};
  return matches.reduce((acc, match, index) => {
    const teamName = match[playerKey];
    if(!teamName) return acc;

    attemptsByTeam[teamName] = (attemptsByTeam[teamName] || 0) + 1;
    if(match.winner !== playerKey) return acc;

    acc.push({
      team: teamName,
      date: match.date || '',
      attempt: attemptsByTeam[teamName],
      eventIndex: index
    });
    attemptsByTeam[teamName] = 0;
    return acc;
  }, []).reverse();
}

function openTrophyModal(playerKey){
  const list = [
    ...buildTrophySummary(playerKey).map(item => ({ ...item, type:'win' })),
    ...buildAbortSummary(playerKey)
  ].sort((a, b) => b.eventIndex - a.eventIndex);
  document.getElementById('trophy-modal-title').textContent = `Trophy ${PLAYERS[playerKey].name}`;
  document.getElementById('trophy-modal-subtitle').textContent = list.length
    ? `${list.length} jejak nasib tim di slot ${PLAYERS[playerKey].name}`
    : `${PLAYERS[playerKey].name} belum punya jejak tim yang tercatat`;
  document.getElementById('trophy-modal-list').innerHTML = list.length
    ? list.map(item => {
      const visual = item.type === 'abort' ? getAbortVisualMeta(item.attempt) : getTryVisualMeta(item.attempt);
      return `
      <div class="trophy-item ${item.type === 'abort' ? 'abort' : ''}">
        <div class="trophy-copy">
          <div class="trophy-team ${item.type === 'abort' ? 'abort' : ''}">${item.team}</div>
          <div class="trophy-note">${visual.emoji} ${visual.tone}</div>
        </div>
        <div class="trophy-meta">
          <span class="trophy-try-badge ${item.type === 'abort' ? 'abort' : ''}">${formatEnglishOrdinal(item.attempt)} try</span>
          <span class="trophy-try-track">${renderTryBlocks(item.attempt, item.type)}</span>
        </div>
      </div>
    `;
    }).join('')
    : '<div class="trophy-empty">Belum ada daftar tim juara untuk player ini.</div>';
  document.getElementById('trophy-modal').classList.remove('is-hidden');
}

function closeTrophyModal(){
  document.getElementById('trophy-modal').classList.add('is-hidden');
}

function handleTrophyBackdrop(event){
  if(event.target.id === 'trophy-modal') closeTrophyModal();
}

function scrollToCompetitionHistory(){
  document.getElementById('competition-history-anchor')?.scrollIntoView({ behavior:'smooth', block:'start' });
}

function polarToCartesian(cx, cy, radius, angle){
  const rad = ((angle - 90) * Math.PI) / 180;
  return {
    x: cx + (radius * Math.cos(rad)),
    y: cy + (radius * Math.sin(rad))
  };
}

function describeDonutSegmentPath(startAngle, endAngle, outerRadius = 50, innerRadius = 32){
  const safeEndAngle = endAngle - 0.001;
  const outerStart = polarToCartesian(50, 50, outerRadius, startAngle);
  const outerEnd = polarToCartesian(50, 50, outerRadius, safeEndAngle);
  const innerEnd = polarToCartesian(50, 50, innerRadius, safeEndAngle);
  const innerStart = polarToCartesian(50, 50, innerRadius, startAngle);
  const largeArcFlag = safeEndAngle - startAngle > 180 ? 1 : 0;
  return [
    `M ${outerStart.x} ${outerStart.y}`,
    `A ${outerRadius} ${outerRadius} 0 ${largeArcFlag} 1 ${outerEnd.x} ${outerEnd.y}`,
    `L ${innerEnd.x} ${innerEnd.y}`,
    `A ${innerRadius} ${innerRadius} 0 ${largeArcFlag} 0 ${innerStart.x} ${innerStart.y}`,
    'Z'
  ].join(' ');
}

function renderPieHitAreas(spans){
  const visibleSpans = spans.filter(segment => segment.span > 0);
  if(!visibleSpans.length) return '';
  return `
    <svg class="totals-pie-hitareas" viewBox="0 0 100 100" aria-hidden="true">
      ${visibleSpans.map(segment => `
        <path
          class="totals-pie-hit"
          d="${describeDonutSegmentPath(segment.start, segment.start + segment.span)}"
          onclick="openTrophyModal('${segment.key}')"
        />
      `).join('')}
    </svg>
  `;
}

async function saveEditModal(){
  if(editingMatchIndex === null) return;
  const current = matches[editingMatchIndex];
  if(!current || !current.id) return;
  const teamT = document.getElementById('edit-team-T').value.trim();
  const teamA = document.getElementById('edit-team-A').value.trim();
  const teamI = document.getElementById('edit-team-I').value.trim();
  const editedDate = document.getElementById('edit-match-date').value.trim();
  if(!teamT || !teamA || !teamI){
    showToast('⚠️ Nama club tidak boleh kosong.','#ffc107');
    return;
  }
  try {
    setLoading(true, 'Menyimpan perubahan...');
    await postSheetAction({
      action:'update',
      id:current.id,
      team_t:teamT,
      team_a:teamA,
      team_i:teamI,
      match_date:editedDate || current.date || '',
      winner:editingWinner,
      created_at:current.created_at || '',
    });
    closeEditModal();
    await refreshMatches();
    showToast('✏️ Riwayat berhasil diupdate!','#00aaee');
  } catch (error) {
    console.error(error);
    showToast(`⚠️ ${error?.message || 'Gagal update riwayat ke Google Sheet.'}`,'#ffc107');
  } finally {
    setLoading(false);
  }
}

/* --- TOAST --- */
function showToast(msg, color){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = color || 'var(--win)';
  t.style.color = color || 'var(--win)';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

/* --- RENDER --- */
function render(){
  const trashMatches = getTrashMatches();
  const wT = matches.filter(m=>m.winner==='T').length;
  const wA = matches.filter(m=>m.winner==='A').length;
  const wI = matches.filter(m=>m.winner==='I').length;
  const winMap = { T:wT, A:wA, I:wI };
  const last = getLastMatch();
  const cur  = last ? {T:last.T,A:last.A,I:last.I} : {T:'—',A:'—',I:'—'};
  const pending = hasPendingMatch();
  const prevResolved = pending && matches.length > 1 ? matches[matches.length - 2] : null;

  document.getElementById('match-count-badge').textContent = matches.length+' Matches';
  const trashToggleBtn = document.getElementById('trash-toggle-btn');
  const trashCountBadge = document.getElementById('trash-count-badge');
  if(trashCountBadge) trashCountBadge.textContent = String(trashMatches.length);
  if(trashCountBadge) trashCountBadge.classList.toggle('is-hidden', trashMatches.length === 0);
  if(trashToggleBtn) trashToggleBtn.title = trashExpanded ? 'Tutup trash lokal' : 'Buka trash lokal';
  if(trashToggleBtn) trashToggleBtn.classList.toggle('is-hidden', trashMatches.length === 0);

  const replacedMap = pending && prevResolved && last
    ? Object.fromEntries(['T','A','I'].map(key => {
        return [key, getAbortedTeamAfterMatch(matches.length - 2, key)];
      }))
    : { T:'', A:'', I:'' };

  // Scoreboard
  const renderCards = (sourceMatch, options = {}) => ['T','A','I'].map(p=>{
    const { clickablePending = false, mini = false, replacedTeams = {} } = options;
    const cls  = p==='T'?'tulus':p==='A'?'asok':'irwan';
    const clickable = clickablePending && sourceMatch && sourceMatch[p] !== '—';
    const isWinner = sourceMatch && sourceMatch.winner === p;
    const hasResult = sourceMatch && !!sourceMatch.winner;
    const abortedTeam = replacedTeams[p];
    return `<div class="player-card ${cls} ${mini ? 'mini' : ''} ${isWinner ? 'winner-state' : ''} ${!hasResult ? 'pending' : ''} ${clickable ? 'clickable' : ''}" ${clickable ? `onclick="confirmWinnerFromCard('${p}')"` : ''}>
      <div class="player-name">${PLAYERS[p].name}</div>
      <div class="player-status-icon">
        ${isWinner ? renderWinnerBadge() : ''}
        ${hasResult && !isWinner ? '<div class="player-loser">👨🏽‍🌾</div>' : ''}
      </div>
      <div class="player-team-name">${sourceMatch ? sourceMatch[p] : '—'}</div>${abortedTeam ? `<div class="player-team-aborted"><span class="player-team-aborted-name">${abortedTeam}</span><span class="player-team-aborted-note">☠️ diaborsi dari slot ini</span></div>` : ''}
    </div>`;
  }).join('');

  document.getElementById('scoreboard').innerHTML = `
    <div class="scoreboard-group ${pending ? 'pending-group' : ''}"><div class="scoreboard-heading ${pending ? 'next' : ''}">${pending ? 'KOMPETISI BERIKUTNYA' : 'HASIL KOMPETISI TERAKHIR'}</div>${pending ? '<div class="next-hint">Tap card untuk pilih juara</div>' : ''}<div class="scoreboard-main">${renderCards(last ? { ...cur, winner:last?.winner || '' } : null, { clickablePending: pending && !!last, replacedTeams: replacedMap })}</div></div>
    ${prevResolved ? `<div class="scoreboard-group mini-group"><button class="previous-btn" type="button" onclick="openResultModal(${matches.length - 2})">Hasil Sebelumnya</button></div>` : ''}
  `;

  // Table
  const tbody = document.getElementById('match-table');
  const trashList = document.getElementById('trash-list');
  if(trashList) trashList.classList.toggle('is-hidden', !trashExpanded);
  const totalWins = wT + wA + wI;
  const degT = totalWins ? (wT / totalWins) * 360 : 0;
  const degA = totalWins ? (wA / totalWins) * 360 : 0;
  const degI = totalWins ? (wI / totalWins) * 360 : 0;
  const shareT = totalWins ? (wT / totalWins) * 100 : 0;
  const shareA = totalWins ? (wA / totalWins) * 100 : 0;
  const shareI = totalWins ? (wI / totalWins) * 100 : 0;
  const pieSegments = totalWins
    ? [
        { key:'T', start:0, span:degT },
        { key:'A', start:degT, span:degA },
        { key:'I', start:degT + degA, span:degI }
      ]
    : [
        { key:'T', start:0, span:120 },
        { key:'A', start:120, span:120 },
        { key:'I', start:240, span:120 }
      ];
  const resolvedMatches = matches.filter(m => m.winner);
  const pieStyle = totalWins
    ? `background:conic-gradient(
        var(--tulus) 0deg ${degT}deg,
        var(--asok) ${degT}deg ${degT + degA}deg,
        var(--irwan) ${degT + degA}deg 360deg
      );`
    : `background:conic-gradient(
        rgba(232,23,93,0.18) 0deg 120deg,
        rgba(14,165,233,0.18) 120deg 240deg,
        rgba(124,58,237,0.18) 240deg 360deg
      );`;

  const getPieLabelStyle = (startDeg, spanDeg) => {
    const midDeg = startDeg + (spanDeg / 2) - 90;
    const rad = (midDeg * Math.PI) / 180;
    const radius = 34;
    const x = 50 + Math.cos(rad) * radius;
    const y = 50 + Math.sin(rad) * radius;
    return `left:${x}%; top:${y}%;`;
  };
  const formatShare = value => {
    const rounded = Math.round(value * 10) / 10;
    return `${rounded % 1 === 0 ? rounded.toFixed(0) : rounded.toFixed(1)}%`;
  };
  const escapeAttr = value => String(value).replace(/&/g, '&amp;').replace(/'/g, '&#39;');
  const setupHistoryChartInteraction = shell => {
    const svg = shell?.querySelector('.history-chart');
    if(!svg) return;

    const rawSeries = shell.dataset.series;
    const rawMeta = shell.dataset.meta;
    if(!rawSeries || !rawMeta) return;

    const series = JSON.parse(rawSeries);
    const meta = JSON.parse(rawMeta);
    const keys = ['T','A','I'];
    const dots = Object.fromEntries(keys.map(key => [key, svg.querySelector(`[data-history-dot="${key}"]`)]));
    const legendValues = Object.fromEntries(keys.map(key => [key, shell.closest('.totals-history-card')?.querySelector(`[data-history-legend="${key}"]`)]));
    const hitbox = svg.querySelector('.history-drag-hitbox');
    if(!hitbox) return;

    const minScroll = 24;
    let activeIndex = meta.lastIndex;
    let dragging = false;
    let pointerId = null;

    const keepIndexVisible = index => {
      const x = series.T[index].x;
      const leftEdge = shell.scrollLeft;
      const rightEdge = leftEdge + shell.clientWidth;
      if(x < leftEdge + minScroll){
        shell.scrollLeft = Math.max(0, x - minScroll);
      } else if(x > rightEdge - minScroll){
        shell.scrollLeft = Math.min(shell.scrollWidth - shell.clientWidth, x - shell.clientWidth + minScroll);
      }
    };

    const paintIndex = index => {
      activeIndex = Math.max(0, Math.min(meta.lastIndex, index));
      keys.forEach(key => {
        const point = series[key][activeIndex];
        dots[key]?.setAttribute('cx', point.x);
        dots[key]?.setAttribute('cy', point.y);
        if(legendValues[key]) legendValues[key].textContent = formatShare(point.pct);
      });
      keepIndexVisible(activeIndex);
    };

    const indexFromClientX = clientX => {
      const rect = shell.getBoundingClientRect();
      const localX = clientX - rect.left + shell.scrollLeft;
      const clamped = Math.max(meta.padLeft, Math.min(meta.chartWidth - meta.padRight, localX));
      const relative = meta.lastIndex === 0
        ? 0
        : (clamped - meta.padLeft) / meta.stepX;
      return Math.round(relative);
    };

    const stopDrag = () => {
      dragging = false;
      pointerId = null;
      svg.classList.remove('is-dragging');
      paintIndex(meta.lastIndex);
    };

    hitbox.addEventListener('pointerdown', event => {
      if(event.pointerType && event.pointerType !== 'mouse') return;
      dragging = true;
      pointerId = event.pointerId;
      svg.classList.add('is-dragging');
      hitbox.setPointerCapture(pointerId);
      paintIndex(indexFromClientX(event.clientX));
      event.preventDefault();
    });

    hitbox.addEventListener('pointermove', event => {
      if(!dragging || event.pointerId !== pointerId) return;
      paintIndex(indexFromClientX(event.clientX));
      event.preventDefault();
    });

    const releasePointer = event => {
      if(!dragging || event.pointerId !== pointerId) return;
      if(hitbox.hasPointerCapture(pointerId)) hitbox.releasePointerCapture(pointerId);
      stopDrag();
    };

    hitbox.addEventListener('pointerup', releasePointer);
    hitbox.addEventListener('pointercancel', releasePointer);
    hitbox.addEventListener('lostpointercapture', stopDrag);

    paintIndex(meta.lastIndex);
  };
  const renderHistoryChart = () => {
    if(!resolvedMatches.length){
      return '<div class="history-empty">Belum ada history persentase karena juara belum tercatat.</div>';
    }

    const chartWidth = Math.max(680, resolvedMatches.length * 28);
    const chartHeight = 260;
    const padLeft = 54;
    const padRight = 18;
    const padTop = 16;
    const padBottom = 38;
    const plotWidth = chartWidth - padLeft - padRight;
    const plotHeight = chartHeight - padTop - padBottom;

    const xAt = index => resolvedMatches.length === 1
      ? padLeft + (plotWidth / 2)
      : padLeft + (index * plotWidth / (resolvedMatches.length - 1));
    const yAt = pct => padTop + plotHeight - ((pct / 100) * plotHeight);

    const cumulative = { T:0, A:0, I:0 };
    const series = { T:[], A:[], I:[] };
    resolvedMatches.forEach((match, index) => {
      cumulative[match.winner] += 1;
      const total = index + 1;
      ['T','A','I'].forEach(key => {
        const pct = (cumulative[key] / total) * 100;
        series[key].push({
          x: xAt(index),
          y: yAt(pct),
          pct,
          label: total
        });
      });
    });

    const lineFor = key => series[key].map(point => `${point.x},${point.y}`).join(' ');
    const lastPoint = key => series[key][series[key].length - 1];
    const stepX = resolvedMatches.length === 1 ? 0 : plotWidth / (resolvedMatches.length - 1);
    const gridLines = [0,25,50,75,100].map(value => {
      const y = yAt(value);
      return `
        <line x1="${padLeft}" y1="${y}" x2="${chartWidth - padRight}" y2="${y}" stroke="var(--border)" stroke-width="1" stroke-dasharray="4 6" />
        <text x="${padLeft - 10}" y="${y + 4}" text-anchor="end" font-size="10" fill="var(--muted)">${value}%</text>
      `;
    }).join('');

    const tickIndexes = resolvedMatches.length <= 8
      ? resolvedMatches.map((_, index) => index)
      : Array.from(new Set([
          0,
          ...Array.from({ length: 4 }, (_, i) => Math.round(((i + 1) * (resolvedMatches.length - 1)) / 5)),
          resolvedMatches.length - 1
        ]));
    const xTicks = tickIndexes.map(index => `
      <text x="${xAt(index)}" y="${chartHeight - 12}" text-anchor="middle" font-size="10" fill="var(--muted)">${index + 1}</text>
    `).join('');
    const meta = escapeAttr(JSON.stringify({
      chartWidth,
      padLeft,
      padRight,
      stepX,
      lastIndex: resolvedMatches.length - 1
    }));
    const seriesAttr = escapeAttr(JSON.stringify(series));

    return `
      <div class="history-chart-shell" data-series='${seriesAttr}' data-meta='${meta}'>
        <svg class="history-chart" viewBox="0 0 ${chartWidth} ${chartHeight}" preserveAspectRatio="xMinYMid meet" style="width:${chartWidth}px;max-width:none;" role="img" aria-label="History graph persentase juara">
          ${gridLines}
          <line x1="${padLeft}" y1="${chartHeight - padBottom}" x2="${chartWidth - padRight}" y2="${chartHeight - padBottom}" stroke="var(--border)" stroke-width="1.2" />
          <polyline fill="none" stroke="var(--tulus)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" points="${lineFor('T')}" />
          <polyline fill="none" stroke="var(--asok)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" points="${lineFor('A')}" />
          <polyline fill="none" stroke="var(--irwan)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" points="${lineFor('I')}" />
          <circle class="history-active-dot" data-history-dot="T" cx="${lastPoint('T').x}" cy="${lastPoint('T').y}" r="4.5" fill="var(--tulus)" stroke="#fff" stroke-width="2" />
          <circle class="history-active-dot" data-history-dot="A" cx="${lastPoint('A').x}" cy="${lastPoint('A').y}" r="4.5" fill="var(--asok)" stroke="#fff" stroke-width="2" />
          <circle class="history-active-dot" data-history-dot="I" cx="${lastPoint('I').x}" cy="${lastPoint('I').y}" r="4.5" fill="var(--irwan)" stroke="#fff" stroke-width="2" />
          ${xTicks}
          <text x="${chartWidth / 2}" y="${chartHeight - 2}" text-anchor="middle" font-size="11" fill="var(--muted)">Pertandingan ke-</text>
          <rect class="history-drag-hitbox" x="${padLeft - 14}" y="${padTop}" width="${plotWidth + 28}" height="${plotHeight}" fill="transparent" />
        </svg>
      </div>
    `;
  };
  const tLabelStyle = totalWins ? getPieLabelStyle(0, degT) : 'left:50%; top:25%;';
  const aLabelStyle = totalWins ? getPieLabelStyle(degT, degA) : 'left:72%; top:66%;';
  const iLabelStyle = totalWins ? getPieLabelStyle(degT + degA, degI) : 'left:28%; top:66%;';

  document.getElementById('totals-grid').innerHTML = `
    <div class="totals-pie-card">
      <div class="totals-pie" style="${pieStyle}">
        ${renderPieHitAreas(pieSegments)}
        <button class="totals-pie-center-hit" type="button" onclick="scrollToCompetitionHistory()" aria-label="Lihat riwayat kompetisi"></button>
        <div class="pie-label t" style="${tLabelStyle}">
          <div class="pie-letter">T</div>
          <div class="pie-trophies t">${wT} trophies</div>
          <div class="pie-percent">${formatShare(shareT)}</div>
        </div>
        <div class="pie-label a" style="${aLabelStyle}">
          <div class="pie-letter">A</div>
          <div class="pie-trophies a">${wA} trophies</div>
          <div class="pie-percent">${formatShare(shareA)}</div>
        </div>
        <div class="pie-label i" style="${iLabelStyle}">
          <div class="pie-letter">I</div>
          <div class="pie-trophies i">${wI} trophies</div>
          <div class="pie-percent">${formatShare(shareI)}</div>
        </div>
        <div class="totals-center">
          <div class="totals-center-label">Total</div>
          <div class="totals-center-value">${totalWins}</div>
        </div>
      </div>
    </div>
    <div class="totals-history-card">
      <div class="totals-history-head">
        <div class="totals-history-title">History Graph</div>
      </div>
      <div class="history-legend">
        <div class="legend-chip"><span class="legend-dot t">T</span><span data-history-legend="T">${formatShare(shareT)}</span></div>
        <div class="legend-chip"><span class="legend-dot a">A</span><span data-history-legend="A">${formatShare(shareA)}</span></div>
        <div class="legend-chip"><span class="legend-dot i">I</span><span data-history-legend="I">${formatShare(shareI)}</span></div>
      </div>
      ${renderHistoryChart()}
    </div>
  `;
  const historyShell = document.querySelector('.history-chart-shell');
  if(historyShell){
    historyShell.scrollLeft = historyShell.scrollWidth;
    setupHistoryChartInteraction(historyShell);
  }

  if(!matches.length){
    tbody.innerHTML='<tr class="empty-row"><td colspan="6">Belum ada pertandingan tercatat.</td></tr>';
    if(trashList){
      trashList.innerHTML = trashMatches.length
        ? trashMatches.map(match => `
          <div class="trash-item">
            <div class="trash-copy">
              <div class="trash-title">${match.T} vs ${match.A} vs ${match.I}</div>
              <div class="trash-meta">${formatDateDisplay(match.date)}${match.winner ? ` · Juara ${PLAYERS[match.winner]?.name || match.winner}` : ' · Belum ada juara'}</div>
            </div>
            <div class="trash-actions">
              <button class="trash-icon-btn restore" type="button" onclick="restoreTrashMatch(${match.id})" title="Restore" aria-label="Restore">↺</button>
              <button class="trash-icon-btn delete" type="button" onclick="permanentlyDeleteTrashMatch(${match.id})" title="Delete permanen" aria-label="Delete permanen">✕</button>
            </div>
          </div>
        `).join('')
        : '';
    }
    syncFormMode();
    return;
  }
  tbody.innerHTML = [...matches].reverse().map((m,i)=>{
    const matchIndex = matches.length - 1 - i;
    const cell = pl => {
      const win = m.winner===pl;
      const aborted = getAbortedTeamAfterMatch(matchIndex, pl);
      return `<td data-label="${PLAYERS[pl].name}"><div class="team-cell">
        ${aborted ? '<span class="team-abort-mark">☠️</span>' : ''}
        <span class="team-name ${win?'winner':''} ${aborted ? 'aborted' : ''}" style="${win?`color:${PLAYERS[pl].color}`:''}">
          ${m[pl]}
        </span>
        ${aborted ? '<span class="team-abort-mark">☠️</span>' : ''}
      </div></td>`;
    };
    return `<tr>
      <td class="row-num col-num" data-label="#">${matches.length - i}</td>
      ${cell('T')}${cell('A')}${cell('I')}
      <td class="date-col col-date" data-label="Tanggal">${formatDateDisplay(m.date)}</td>
      <td class="action-cell col-actions" data-label="">
        <div class="action-buttons">
          <button class="btn-edit" onclick="editMatch(${matchIndex})" title="Edit">✎</button>
          <button class="btn-del" onclick="deleteMatch(${matchIndex})" title="Hapus">✕</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  if(trashList){
    trashList.innerHTML = trashMatches.length
      ? trashMatches.map(match => `
        <div class="trash-item">
          <div class="trash-copy">
            <div class="trash-title">${match.T} vs ${match.A} vs ${match.I}</div>
            <div class="trash-meta">${formatDateDisplay(match.date)}${match.winner ? ` · Juara ${PLAYERS[match.winner]?.name || match.winner}` : ' · Belum ada juara'}</div>
          </div>
          <div class="trash-actions">
            <button class="trash-icon-btn restore" type="button" onclick="restoreTrashMatch(${match.id})" title="Restore" aria-label="Restore">↺</button>
            <button class="trash-icon-btn delete" type="button" onclick="permanentlyDeleteTrashMatch(${match.id})" title="Delete permanen" aria-label="Delete permanen">✕</button>
          </div>
        </div>
      `).join('')
      : '';
  }

  syncFormMode();
  renderHistoryMode();
}

initTheme();
render();
initData();
initFooterStars();
</script>
</body>
</html>
